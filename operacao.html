<script>
    // Inicializa a grade de operadores
    const grid = document.getElementById('team');
    for(let i=1; i<=20; i++) {
        const dot = document.createElement('div');
        dot.className = 'op-dot';
        dot.innerText = i < 10 ? '0'+i : i;
        if(i > 16) dot.style.background = '#555'; // Simula offline (17 a 20)
        grid.appendChild(dot);
    }

    // FUNÇÃO BLINDADA: Libera o lote e avisa o sistema do Operador
    function liberarLotes() {
        // 1. Esconde o alerta na sua tela
        document.getElementById('transbordoAlert').style.display = 'none';
        
        // 2. BLINDAGEM: Salva no "cérebro" do navegador que o SAP está liberado
        localStorage.setItem('sap_status', 'LIBERADO');
        localStorage.setItem('lote_ativo', 'Eletrônicos');
        
        alert("COMANDO MESTRE ENVIADO: Lotes disparados para a fila dos operadores!");
    }

    // Controle do Botão de Pânico
    function toggleProducao() {
        const btn = document.getElementById('masterAction');
        const txt = document.getElementById('statusText');
        
        if(btn.classList.contains('btn-stop')) {
            btn.innerText = "RETOMAR PRODUÇÃO (ON)";
            btn.className = "btn-master btn-on";
            txt.innerText = "🛑 PRODUÇÃO INTERROMPIDA POR JORGE";
            txt.style.color = "red";
            localStorage.setItem('producao_geral', 'PAUSADA');
        } else {
            btn.innerText = "STOP GERAL";
            btn.className = "btn-master btn-stop";
            txt.innerText = "● UNIDADE PALMAS EM OPERAÇÃO";
            txt.style.color = "green";
            localStorage.setItem('producao_geral', 'RODANDO');
        }
    }
</script>
