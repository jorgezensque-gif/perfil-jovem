<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP 4.0 - Gestão Integrada Palmas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --dark: #2c3e50; --gold: #f1c40f; --green: #27ae60; --alta: #e74c3c; --light: #f4f7f6; --purple: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 320px; background: var(--dark); color: white; padding: 20px; display: flex; flex-direction: column; border-right: 5px solid #34495e; overflow-y: auto; }
        .user-info { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; border-left: 4px solid var(--gold); margin-bottom: 15px; }
        .btn-stop { background: #ff0000; color: white; border: 4px solid #b30000; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 15px; width: 100%; font-size: 1.2em; }

        .box-lateral { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--gold); }
        
        /* Mini Gráfico Lateral */
        #mini-grafico-container { background: white; padding: 5px; border-radius: 5px; margin-top: 10px; height: 120px; }

        .btn-acao { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-pdf { background: var(--purple); }
        .btn-pdf:hover { background: #6c3483; }

        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .top-dash { display: flex; gap: 15px; margin-bottom: 25px; }
        .kpi-card { flex: 1; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; text-align: center; }
        .kpi-card b { font-size: 2.5em; color: var(--dark); display: block; }

        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; flex-direction:column; justify-content:center; align-items:center; color:white; text-align:center; }
        #overlay-erro { background:rgba(0,0,0,0.95); border: 15px solid var(--alta); }
        .item-erro { background: var(--alta); color: white; padding: 10px; margin-top: 5px; border-radius: 4px; font-size: 0.75em; cursor: pointer; border: 1px solid white; }
    </style>
</head>
<body>

    <div id="overlay-erro" class="overlay">
        <h1 style="font-size: 4em; color: var(--alta);">BLOQUEIO DE QUALIDADE</h1>
        <h2 style="color: var(--gold);">AGUARDE A LIBERAÇÃO DA GESTÃO</h2>
    </div>

    <div class="sidebar">
        <div class="user-info">
            <small>SVP OPERACIONAL V4.0</small>
            <h3 id="u-nome">---</h3>
            <span id="u-nivel" style="color:var(--gold); font-size:0.8em; font-weight:bold;"></span>
        </div>

        <button class="btn-stop" onclick="acionarStop()">S T O P</button>

        <div id="painel-op" style="display:none" class="box-lateral">
            <small style="color:var(--gold); font-weight:bold;">🔢 CALCULADORA</small>
            <div style="background:#000; color:#2ecc71; padding:10px; text-align:right; margin:8px 0; border-radius:4px; font-family:monospace;" id="display-pad">0</div>
            <button onclick="confirmarBaixa()" style="width:100%; padding:10px; background:var(--green); border:none; color:white; font-weight:bold; cursor:pointer; border-radius:4px;">CONFIRMAR LOTE</button>
        </div>

        <div id="painel-gestao" style="display:none">
            <div class="box-lateral" style="background:white; color:var(--dark);">
                <strong style="color:var(--alta); font-size:0.75em;">🚨 AUDITORIA CENTRAL</strong>
                <div id="lista-erros-global"></div>
            </div>

            <div class="box-lateral">
                <small style="color:var(--gold); font-weight:bold;">📊 TENDÊNCIA (ÚLT. 5 MIN)</small>
                <div id="mini-grafico-container">
                    <canvas id="miniChart"></canvas>
                </div>
            </div>

            <button class="btn-acao btn-pdf" onclick="exportarRelatorioPDF()">📄 EXPORTAR RELATÓRIO PDF</button>
        </div>

        <button onclick="localStorage.clear(); window.location.href='index.html'" style="margin-top:auto; background:none; border:1px solid #555; color:#888; cursor:pointer; font-size:0.7em; padding:5px;">SAIR</button>
    </div>

    <div class="main">
        <div class="top-dash">
            <div class="kpi-card"><small>REALIZADO</small><b id="kpi-realizado">0</b></div>
            <div class="kpi-card"><small>META SEMANAL</small><b>50</b></div>
        </div>
        <h3>FILA DE PRODUÇÃO ATIVA</h3>
        <div id="container-pedidos"></div>
    </div>

    <script>
        const gestores = ['jorge_zensque', 'ceo_jovem', 'ger_logistica'];
        const usuario = localStorage.getItem('svp_user') || 'OP_01';
        let processados = parseInt(localStorage.getItem('svp_score')) || 0;
        let historicoProducao = [0, 0, 0, 0, 0]; // Dados para o mini gráfico
        let miniChart;

        function inicializar() {
            document.getElementById('u-nome').innerText = usuario.toUpperCase();
            const isGestao = gestores.includes(usuario.toLowerCase());
            
            if(isGestao) {
                document.getElementById('u-nivel').innerText = "GESTÃO MASTER";
                document.getElementById('painel-gestao').style.display = 'block';
                iniciarMiniGrafico();
            } else {
                document.getElementById('u-nivel').innerText = "OPERADOR";
                document.getElementById('painel-op').style.display = 'block';
            }
            
            atualizarKPIs();
            setInterval(atualizarDadosGrafico, 60000); // Atualiza gráfico a cada minuto
            setInterval(sincronizar, 1000);
        }

        function iniciarMiniGrafico() {
            const ctx = document.getElementById('miniChart').getContext('2d');
            miniChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['', '', '', '', 'Agora'],
                    datasets: [{
                        label: 'Lotes/Min',
                        data: historicoProducao,
                        borderColor: '#f1c40f',
                        backgroundColor: 'rgba(241, 196, 15, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false } }
                }
            });
        }

        function atualizarDadosGrafico() {
            if(!miniChart) return;
            historicoProducao.shift();
            historicoProducao.push(Math.floor(Math.random() * 5)); // Simula volume variável
            miniChart.update();
        }

        function exportarRelatorioPDF() {
            const dataHora = new Date().toLocaleString();
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <body style="font-family:sans-serif; padding:40px;">
                    <h1 style="color:#2c3e50">Relatório Operacional SVP 4.0 - Palmas</h1>
                    <hr>
                    <p><b>Data/Hora:</b> ${dataHora}</p>
                    <p><b>Gestor Responsável:</b> ${usuario.toUpperCase()}</p>
                    <h2>Produção Atual: ${processados} / 50 Lotes</h2>
                    <div style="height:20px; background:#eee; width:100%;">
                        <div style="height:100%; background:#27ae60; width:${(processados/50)*100}%"></div>
                    </div>
                    <p><i>Documento gerado automaticamente pelo Sistema de Gestão de Prioridades.</i></p>
                    <button onclick="window.print()">Imprimir PDF</button>
                </body>
                </html>
            `);
        }

        function sincronizar() {
            const erros = JSON.parse(localStorage.getItem('svp_erros')) || [];
            if(gestores.includes(usuario.toLowerCase())) {
                const lista = document.getElementById('lista-erros-global');
                lista.innerHTML = erros.map((e, i) => `<div class="item-erro" onclick="liberar(${i})">LIBERAR: ${e.op}</div>`).join('') || 'Sem erros.';
            } else {
                document.getElementById('overlay-erro').style.display = erros.some(e => e.op === usuario) ? 'flex' : 'none';
            }
        }

        function liberar(index) {
            let erros = JSON.parse(localStorage.getItem('svp_erros')) || [];
            erros.splice(index, 1);
            localStorage.setItem('svp_erros', JSON.stringify(erros));
        }

        function atualizarKPIs() {
            document.getElementById('kpi-realizado').innerText = processados;
            localStorage.setItem('svp_score', processados);
        }

        inicializar();
    </script>
</body>
</html>
