<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP 4.0 - Operacional Palmas</title>
    <style>
        :root { --dark: #232f3e; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; }

        .sidebar { width: 340px; background: #2c3e50; color: white; display: flex; flex-direction: column; padding: 15px; border-right: 4px solid #1a252f; }
        .user-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 8px; border-left: 5px solid var(--gold); margin-bottom: 10px; }
        
        .btn-stop { width: 100%; padding: 20px; border: none; border-radius: 6px; background: var(--red); color: white; font-weight: bold; font-size: 1.5em; cursor: pointer; margin-bottom: 15px; }

        .sap-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9em; }
        .sap-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .calc { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-top: auto; }
        .screen { background: #000; color: var(--green); text-align: right; padding: 15px; font-size: 2em; font-family: monospace; border-radius: 4px; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .b-calc { padding: 20px; border: none; border-radius: 4px; background: #3e5871; color: white; font-weight: bold; font-size: 1.2em; cursor: pointer; }

        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; border-left: 10px solid var(--purple); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="user-box">
            <small>SVP OPERACIONAL V4.0</small>
            <h2 style="margin: 5px 0;">OP_01</h2>
            <span style="color: var(--gold); font-size: 0.8em; font-weight: bold;">OPERADOR</span>
        </div>

        <button class="btn-stop">STOP</button>

        <div class="sap-box">
            <b style="color:var(--gold);">📦 ESTOQUE (VALORES SAP)</b>
            <div class="sap-row"><span>Óculos:</span> <b>500</b></div>
            <div class="sap-row"><span>Cozinha:</span> <b>300</b></div>
            <div class="sap-row" style="color:var(--gold)"><span>Eletrônicos:</span> <b>200</b></div>
        </div>

        <div class="calc">
            <div class="screen">0</div>
            <div class="grid">
                <button class="b-calc">7</button><button class="b-calc">8</button><button class="b-calc">9</button>
                <button class="b-calc">4</button><button class="b-calc">5</button><button class="b-calc">6</button>
                <button class="b-calc">1</button><button class="b-calc">2</button><button class="b-calc">3</button>
                <button class="b-calc" style="background:var(--red)">C</button>
                <button class="b-calc">0</button>
                <button class="b-calc" style="background:var(--green)">OK</button>
            </div>
        </div>
    </aside>

    <main class="main">
        <h1 style="color: var(--green);">● EM OPERAÇÃO</h1>
        <div style="font-size: 5em; font-weight: bold; color: #9b59b6;">0</div>
        <hr>
        <h3>📋 FILA DE PRODUÇÃO ATIVA</h3>
        <div class="card">
            <div><b>LOTE: Eletrônicos</b><br><small>Aguardando Baixa SAP</small></div>
            <b style="color: #888;">AGUARDANDO</b>
        </div>
    </main>
</body>
</html>
