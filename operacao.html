<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP 4.0 - Operacional Palmas</title>
    <style>
        :root { --dark: #232f3e; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; }

        /* SIDEBAR: ESTOQUE E CALCULADORA */
        .sidebar { width: 340px; background: #2c3e50; color: white; display: flex; flex-direction: column; padding: 15px; border-right: 4px solid #1a252f; }
        .user-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; border-left: 5px solid var(--gold); margin-bottom: 15px; }
        
        .btn-pause { width: 100%; padding: 15px; border: none; border-radius: 6px; background: var(--red); color: white; font-weight: bold; font-size: 1.2em; cursor: pointer; margin-bottom: 10px; }
        .btn-retomar { background: #555; }

        .sap-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9em; }
        .sap-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .calc { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-top: auto; }
        .screen { background: #000; color: var(--green); text-align: right; padding: 10px; font-size: 1.8em; font-family: monospace; border-radius: 4px; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .b-calc { padding: 15px; border: none; border-radius: 4px; background: #3e5871; color: white; font-weight: bold; cursor: pointer; }

        /* ÁREA DE PRODUÇÃO E META */
        .main { flex: 1; padding: 30px; overflow-y: auto; text-align: center; }
        .meta-box { display: flex; justify-content: flex-end; align-items: center; gap: 15px; margin-bottom: 40px; }
        .prod-atual { font-size: 8em; font-weight: bold; color: #2c3e50; margin: 20px 0; }
        .status-tag { font-weight: bold; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="user-box">
            <small>SVP OPERACIONAL V4.0</small>
            <h2 style="margin: 5px 0;">OP_01</h2>
            <span style="color: var(--gold); font-size: 0.8em;">LINHA EM PALMAS</span>
        </div>

        <button id="btnToggle" class="btn-pause" onclick="toggleLinha()">STOP</button>

        <div class="sap-box">
            <b style="color:var(--gold);">📦 ESTOQUE (VALORES SAP)</b>
            <div class="sap-row"><span>Óculos:</span> <b>500</b></div>
            <div class="sap-row"><span>Cozinha:</span> <b>300</b></div>
            <div class="sap-row"><span>Papelaria:</span> <b>600</b></div>
        </div>

        <div class="calc">
            <div class="screen" id="calcScreen">0</div>
            <div class="grid">
                <button class="b-calc" onclick="addNum('7')">7</button><button class="b-calc" onclick="addNum('8')">8</button><button class="b-calc" onclick="addNum('9')">9</button>
                <button class="b-calc" onclick="addNum('4')">4</button><button class="b-calc" onclick="addNum('5')">5</button><button class="b-calc" onclick="addNum('6')">6</button>
                <button class="b-calc" onclick="addNum('1')">1</button><button class="b-calc" onclick="addNum('2')">2</button><button class="b-calc" onclick="addNum('3')">3</button>
                <button class="b-calc" style="background:var(--red)" onclick="clearCalc()">C</button>
                <button class="b-calc" onclick="addNum('0')">0</button>
                <button class="b-calc" style="background:var(--green)" onclick="contar()">OK</button>
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="meta-box">
            <div id="msgStatus" style="color: var(--green); font-weight: bold;">● EM OPERAÇÃO</div>
            <div style="background: #eee; padding: 5px 15px; border-radius: 5px;">
                <b>META: 40/DIA</b>
            </div>
        </div>

        <div style="color: #888; font-weight: bold;">TOTAL REALIZADO</div>
        <div class="prod-atual" id="contador">0</div>
        
        <div id="linhaMsg" style="color: var(--red); font-weight: bold; visibility: hidden;">■ LINHA PARADA</div>

        <div style="margin-top: 50px; text-align: left;">
            <h3>📋 FILA DE PRODUÇÃO ATIVA</h3>
            <div style="background: white; padding: 20px; border-radius: 10px; border-left: 10px solid var(--gold); display: flex; justify-content: space-between;">
                <b>LOTE: Eletrônicos</b>
                <span style="color: var(--red); font-weight: bold;">PENDENTE</span>
            </div>
        </div>
    </main>

    <script>
        let prod = 0;
        function addNum(n) { 
            const s = document.getElementById('calcScreen');
            s.innerText = s.innerText === '0' ? n : s.innerText + n;
        }
        function clearCalc() { document.getElementById('calcScreen').innerText = '0'; }
        
        function contar() {
            prod++;
            document.getElementById('contador').innerText = prod;
            clearCalc();
            if(prod >= 40) alert("Meta atingida!");
        }

        function toggleLinha() {
            const btn = document.getElementById('btnToggle');
            const msg = document.getElementById('linhaMsg');
            const st = document.getElementById('msgStatus');

            if(btn.innerText === "STOP") {
                btn.innerText = "RETOMAR";
                btn.className = "btn-pause btn-retomar";
                msg.style.visibility = "visible";
                st.style.color = "red";
                st.innerText = "○ PAUSADO";
            } else {
                btn.innerText = "STOP";
                btn.className = "btn-pause";
                msg.style.visibility = "hidden";
                st.style.color = "var(--green)";
                st.innerText = "● EM OPERAÇÃO";
            }
        }
    </script>
</body>
</html>
