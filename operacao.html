<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP 4.0 - Gestão de Prioridades Palmas</title>
    <style>
        :root { 
            --baixa: #ecf0f1; --normal: #3498db; --normal-alta: #f1c40f; --alta: #e74c3c;
            --dark: #2c3e50; --gold: #f1c40f; --green: #27ae60; --light: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 320px; background: var(--dark); color: white; padding: 20px; display: flex; flex-direction: column; border-right: 5px solid #34495e; }
        .user-info { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; border-left: 4px solid var(--gold); margin-bottom: 15px; }
        
        .admin-panel, #area-auditoria-master { 
            display: none; 
            background: #1e272e; padding: 15px; border-radius: 8px; border: 1px solid var(--gold); margin-bottom: 15px; 
        }
        
        #area-auditoria-master { border-color: var(--alta); background: #ffffff; color: #2c3e50; }

        .btn-lider { width: 100%; padding: 10px; margin-top: 5px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        
        .main { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 10px solid #ccc; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        
        .prio-baixa { border-left-color: var(--baixa); }
        .prio-normal { border-left-color: var(--normal); }
        .prio-normal-alta { border-left-color: var(--normal-alta); animation: pulse 2s infinite; }
        .prio-alta { border-left-color: var(--alta); background: #fdf2f2; border-left-width: 20px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .card.concluido { opacity: 0.4; pointer-events: none; border-left-color: var(--green); }
        
        .card.erro-validacao { border-left: 20px solid var(--alta) !important; background: #fff5f5; animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        #svp-pad { position: absolute; top: 150px; right: 30px; width: 220px; background: var(--dark); border: 2px solid var(--gold); border-radius: 12px; padding: 15px; color: white; z-index: 1000; cursor: grab; }
        
        /* Estilo do botão de Logout */
        .btn-logout { 
            margin-top: 12px; width: 100%; padding: 8px; background: transparent; 
            border: 1px solid var(--alta); color: var(--alta); cursor: pointer; 
            border-radius: 4px; font-weight: bold; font-size: 0.75em; transition: 0.3s;
        }
        .btn-logout:hover { background: var(--alta); color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-info">
            <small>SVP OPERACIONAL V4.0</small>
            <h3 id="u-nome" style="margin:5px 0">CARREGANDO...</h3>
            <span id="u-time" style="color:var(--gold); font-weight: bold;">--</span>
            <br><small id="u-nivel" style="opacity: 0.7;"></small>
            <button class="btn-logout" onclick="fazerLogout()">🚪 ENCERRAR SESSÃO</button>
        </div>

        <div class="admin-panel" id="panel-ceo">
            <small style="color:var(--gold)">CONTROLE DE EMISSÃO (CEO)</small>
            <button class="btn-lider" id="btn-freeze" style="background:var(--alta)" onclick="toggleFreeze()">CONGELAR LOTE</button>
            <button class="btn-lider" style="background:var(--normal)" onclick="gerarPedidoForçado()">DISPARAR LOTE COMPRA</button>
        </div>

        <div id="area-auditoria-master">
            <h4 style="color:var(--alta); margin:0 0 10px 0; font-size: 0.8em;">🚨 AUDITORIA DE RETRABALHO</h4>
            <div id="lista-bloqueados" style="font-size: 0.75em; max-height: 200px; overflow-y: auto;">
                <p style="color:#999; font-style:italic;">Nenhum bloqueio.</p>
            </div>
        </div>

        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;">
            <small>META SEMANAL</small>
            <h3 id="meta-txt" style="margin:5px 0">0 / 50</h3>
            <div style="height: 10px; background: #444; border-radius: 5px; overflow: hidden;">
                <div id="meta-barra" style="height: 100%; background: var(--gold); width: 0%; transition: 0.5s;"></div>
            </div>
        </div>

        <h4 style="color:var(--gold); margin-top: 20px;">ESTOQUE CENTRAL</h4>
        <div id="lista-estoque" style="font-size: 0.85em;"></div>

        <div style="margin-top: auto; font-size: 0.6em; opacity: 0.5;">
            Responsável: Jorge Zensque [2026]<br>Unidade Palmas / TO
        </div>
    </div>

    <div class="main">
        <div class="stats-grid" style="display:flex; gap:15px; margin-bottom:20px;">
            <div class="stat-box" style="flex:1; background:white; padding:15px; border-radius:10px; text-align:center;">
                <small>DEMANDA ATRASADA</small><br>
                <span id="count-atraso" style="color:var(--alta); font-weight:bold; font-size:1.4em;">0</span>
            </div>
            <div class="stat-box" style="flex:1; background:white; padding:15px; border-radius:10px; text-align:center;">
                <small>LOTE DO DIA (PROC.)</small><br>
                <span id="count-hoje" style="font-size:1.4em; font-weight:bold;">0</span>
            </div>
        </div>

        <div id="container-pedidos"></div>

        <div id="svp-pad">
            <div style="font-size: 0.6em; margin-bottom: 5px; color: var(--gold); text-align: center;">AUDITORIA SVP</div>
            <div id="display-pad" style="background:#1e272e; color:#2ecc71; padding:10px; text-align:right; border-radius:5px; margin-bottom:10px; font-family: monospace;">0</div>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 5px;">
                <button onclick="teclar(7)" style="padding:10px">7</button><button onclick="teclar(8)" style="padding:10px">8</button><button onclick="teclar(9)" style="padding:10px">9</button>
                <button onclick="teclar(4)" style="padding:10px">4</button><button onclick="teclar(5)" style="padding:10px">5</button><button onclick="teclar(6)" style="padding:10px">6</button>
                <button onclick="teclar(1)" style="padding:10px">1</button><button onclick="teclar(2)" style="padding:10px">2</button><button onclick="teclar(3)" style="padding:10px">3</button>
                <button onclick="limparPad()" style="background:var(--alta); color:white">C</button><button onclick="teclar(0)" style="padding:10px">0</button><button onclick="calcularPad()" style="background:var(--green); color:white">=</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURAÇÕES DE SEGURANÇA ---
        const gestoresAutorizados = ['jorge_zensque', 'diretor', 'gerente'];
        const usuarioLogado = localStorage.getItem('svp_user') || 'visitante';
        const time = localStorage.getItem('svp_time') || '1';
        
        // Timer de Inatividade (30 Minutos)
        let tempoInatividade;
        const TRINTA_MINUTOS = 30 * 60 * 1000;

        function resetarTimer() {
            clearTimeout(tempoInatividade);
            tempoInatividade = setTimeout(logoutAutomatico, TRINTA_MINUTOS);
        }

        // Eventos que resetam o cronômetro
        window.onmousemove = resetarTimer;
        window.onkeydown = resetarTimer;
        window.onclick = resetarTimer;

        function logoutAutomatico() {
            alert("⚠️ SESSÃO EXPIRADA: O sistema foi deslogado por inatividade.");
            executarSaida();
        }

        function fazerLogout() {
            if (confirm("Deseja encerrar sua sessão atual?")) {
                executarSaida();
            }
        }

        function executarSaida() {
            localStorage.clear();
            window.location.href = "index.html"; 
        }

        // --- 2. LÓGICA DO SISTEMA ---
        let freeze = false;
        let processados = 0;
        let filaRetrabalho = [];
        const metaSemanal = 50;

        const estoque = [
            { item: "Óculos", saldo: 500 },
            { item: "Cozinha", saldo: 300 },
            { item: "Eletrônicos", saldo: 200 },
            { item: "Papelaria", saldo: 600 }
        ];

        function aplicarSeguranca() {
            const painel = document.getElementById('panel-ceo');
            const areaMaster = document.getElementById('area-auditoria-master');
            const labelNivel = document.getElementById('u-nivel');
            
            document.getElementById('u-nome').innerText = usuarioLogado.toUpperCase();
            document.getElementById('u-time').innerText = "CÉLULA: " + time;

            if(gestoresAutorizados.includes(usuarioLogado.toLowerCase())) {
                painel.style.display = 'block';
                areaMaster.style.display = 'block';
                labelNivel.innerText = "ACESSO: GESTÃO MASTER";
            } else {
                labelNivel.innerText = "ACESSO: OPERACIONAL";
            }
            resetarTimer();
        }

        function darBaixa(btn, nomeItem) {
            const valorDigitado = parseInt(document.getElementById('display-pad').innerText);
            const itemObj = estoque.find(i => i.item === nomeItem);

            if (valorDigitado !== itemObj.saldo) {
                filaRetrabalho.push({ item: nomeItem, operador: usuarioLogado.toUpperCase(), hora: new Date().toLocaleTimeString() });
                processados = Math.max(0, processados - 5); 
                btn.parentElement.remove(); 
                alert("🚨 BLOQUEIO: Valor incorreto! Lote enviado para Auditoria.");
                renderizarAuditoria();
                atualizarTelas();
                return;
            }

            itemObj.saldo--;
            processados++;
            btn.parentElement.classList.add('concluido');
            btn.innerText = "OK";
            btn.disabled = true;
            limparPad();
            atualizarTelas();
        }

        function renderizarAuditoria() {
            const container = document.getElementById('lista-bloqueados');
            container.innerHTML = filaRetrabalho.map((lote, index) => `
                <div style="background:#f8d7da; padding:8px; margin-bottom:5px; border-radius:4px; border:1px solid #f5c6cb">
                    <b>${lote.item}</b> (${lote.operador})<br>
                    <button onclick="liberarLote(${index})" style="background:var(--green); color:white; border:none; width:100%; margin-top:5px; cursor:pointer; font-weight:bold;">UNLOCK</button>
                </div>
            `).join('') || '<p style="color:#999; font-style:italic;">Nenhum bloqueio.</p>';
        }

        function liberarLote(index) {
            filaRetrabalho.splice(index, 1);
            processados += 1; 
            renderizarAuditoria();
            atualizarTelas();
        }

        function atualizarTelas() {
            document.getElementById('lista-estoque').innerHTML = estoque.map(i => `
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid #444; padding:5px 0">
                    <span>${i.item}</span><b>${i.saldo}</b>
                </div>
            `).join('');
            document.getElementById('meta-txt').innerText = `${processados} / ${metaSemanal}`;
            document.getElementById('meta-barra').style.width = Math.min((processados/metaSemanal)*100, 100) + "%";
            document.getElementById('count-hoje').innerText = processados;
        }

        function gerarPedido() {
            if(freeze) return;
            const prioridades = [
                {tipo: 'baixa', classe: 'prio-baixa', txt: 'BAIXA'},
                {tipo: 'normal', classe: 'prio-normal', txt: 'NORMAL'},
                {tipo: 'normal-alta', classe: 'prio-normal-alta', txt: 'NORMAL ALTA'},
                {tipo: 'alta', classe: 'prio-alta', txt: 'URGENTE'}
            ];
            const p = prioridades[Math.floor(Math.random() * prioridades.length)];
            const itemSorteado = estoque[Math.floor(Math.random() * estoque.length)].item;
            
            const div = document.createElement('div');
            div.className = `card ${p.classe}`;
            div.innerHTML = `<div><small>${p.txt}</small><br><span>📦 <b>LOTE:</b> ${itemSorteado}</span></div>
                             <button class="btn-lider" style="background:var(--dark); width:auto; padding:8px 15px" onclick="darBaixa(this, '${itemSorteado}')">BAIXA SAP</button>`;
            document.getElementById('container-pedidos').prepend(div);
            if(document.getElementById('container-pedidos').children.length > 8) document.getElementById('container-pedidos').lastChild.remove();
        }

        function toggleFreeze() { freeze = !freeze; const btn = document.getElementById('btn-freeze'); btn.innerText = freeze ? "LIBERAR" : "CONGELAR"; btn.style.background = freeze ? "var(--green)" : "var(--alta)"; }
        function gerarPedidoForçado() { if(!freeze) for(let i=0; i<3; i++) gerarPedido(); }
        
        const pad = document.getElementById("svp-pad");
        let isDragging=false, px=0, py=0;
        pad.onmousedown = (e) => { isDragging=true; px=e.clientX-pad.offsetLeft; py=e.clientY-pad.offsetTop; };
        document.onmousemove = (e) => { if(isDragging){ pad.style.left=(e.clientX-px)+"px"; pad.style.top=(e.clientY-py)+"px"; } };
        document.onmouseup = () => isDragging=false;

        let buffer = "";
        function teclar(n) { buffer += n; document.getElementById('display-pad').innerText = buffer; }
        function limparPad() { buffer = ""; document.getElementById('display-pad').innerText = "0"; }
        function calcularPad() { try { buffer = eval(buffer).toString(); document.getElementById('display-pad').innerText = buffer; } catch { limparPad(); } }

        aplicarSeguranca();
        atualizarTelas();
        setInterval(gerarPedido, 8000);
    </script>
</body>
</html>
