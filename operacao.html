<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP - Sistema de Gestão Palmas</title>
    <style>
        :root { --blue: #2980b9; --dark: #2c3e50; --gold: #f1c40f; --light: #f4f7f6; --green: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: var(--dark); color: white; padding: 20px; border-right: 5px solid #34495e; display: flex; flex-direction: column; z-index: 10; }
        .user-badge { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid var(--gold); }
        
        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        th { text-align: left; color: var(--gold); padding: 8px; border-bottom: 1px solid #455a64; }
        td { padding: 8px; border-bottom: 1px solid #34495e; }

        /* Área Principal */
        .main { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        
        /* Estilo Conferido */
        .card.concluido { border-left-color: var(--green); background: #e8f6f3; opacity: 0.8; }

        /* COLETOR FLUTUANTE (SVP-PAD) */
        #svp-pad { 
            position: absolute; top: 100px; right: 20px; width: 220px; 
            background: #2c3e50; border: 2px solid var(--gold); border-radius: 12px; 
            padding: 15px; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            z-index: 9999; cursor: grab; 
        }
        #svp-pad:active { cursor: grabbing; }
        #display-pad { background: #1e272e; color: #2ecc71; padding: 10px; text-align: right; font-size: 1.5em; border-radius: 5px; margin-bottom: 10px; font-family: monospace; }
        .grid-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .grid-buttons button { padding: 12px; border: none; border-radius: 6px; background: #34495e; color: white; font-weight: bold; cursor: pointer; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-badge">
            <small>UNIDADE: PALMAS - TO</small>
            <h3 id="u-nome">--</h3>
            <span id="u-time" style="color:var(--gold)">TIME: --</span>
        </div>
        <h4 style="color: var(--gold)">ESTOQUE EM TEMPO REAL</h4>
        <table>
            <thead><tr><th>ITEM</th><th>S. INICIAL</th><th>SALDO</th></tr></thead>
            <tbody id="estoque-corpo"></tbody>
        </table>
        <div style="margin-top: auto; font-size: 0.7em; opacity: 0.6;">
            Responsável: Jorge Zensque [2026]<br>Compliance: Projeto Pescar
        </div>
    </div>

    <div class="main" id="area-pedidos">
        <h2>📥 FILA DE PEDIDOS DISPONÍVEIS</h2>
        <div id="pedidos"></div>

        <div id="svp-pad">
            <div style="font-size: 0.6em; margin-bottom: 5px; color: var(--gold); text-align: center;">VALIDADOR DE CONFERÊNCIA V4.0</div>
            <div id="display-pad">0</div>
            <div class="grid-buttons">
                <button onclick="teclar(7)">7</button><button onclick="teclar(8)">8</button><button onclick="teclar(9)">9</button>
                <button onclick="teclar(4)">4</button><button onclick="teclar(5)">5</button><button onclick="teclar(6)">6</button>
                <button onclick="teclar(1)">1</button><button onclick="teclar(2)">2</button><button onclick="teclar(3)">3</button>
                <button onclick="limparPad()" style="background:#e74c3c">C</button><button onclick="teclar(0)">0</button><button onclick="calcularPad()" style="background:#27ae60">=</button>
            </div>
        </div>
    </div>

    <script>
        const user = localStorage.getItem('svp_user') || 'OPERADOR';
        const time = localStorage.getItem('svp_time') || '1';
        document.getElementById('u-nome').innerText = user;
        document.getElementById('u-time').innerText = "TIME: " + time;

        // Estoque estático para simulação
        const estoque = [
            { item: "Óculos", inicial: 500, saldo: 500 },
            { item: "Cozinha", inicial: 300, saldo: 297 },
            { item: "Eletrônicos", inicial: 200, saldo: 200 },
            { item: "Papelaria", inicial: 600, saldo: 597 }
        ];

        function atualizarEstoque() {
            document.getElementById('estoque-corpo').innerHTML = estoque.map(i => `
                <tr><td>${i.item}</td><td>${i.inicial}</td><td style="color:${i.saldo < i.inicial ? '#ff7675' : '#55efc4'}">${i.saldo}</td></tr>
            `).join('');
        }
        atualizarEstoque();

        // Arrastar Calculadora
        const pad = document.getElementById("svp-pad");
        let isDragging = false, px = 0, py = 0;
        pad.onmousedown = (e) => { isDragging = true; px = e.clientX - pad.offsetLeft; py = e.clientY - pad.offsetTop; };
        document.onmousemove = (e) => { if (isDragging) { pad.style.left = (e.clientX - px) + "px"; pad.style.top = (e.clientY - py) + "px"; } };
        document.onmouseup = () => { isDragging = false; };

        // Funções Calculadora
        let buffer = "";
        function teclar(n) { buffer += n; document.getElementById('display-pad').innerText = buffer; }
        function limparPad() { buffer = ""; document.getElementById('display-pad').innerText = "0"; }
        function calcularPad() { try { buffer = eval(buffer).toString(); document.getElementById('display-pad').innerText = buffer; } catch { limparPad(); } }

        // Sistema de Pedidos e Conferência
        function criarPedido() {
            const itens = ["Óculos", "Cozinha", "Eletrônicos", "Papelaria"];
            const item = itens[Math.floor(Math.random() * itens.length)];
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<span><b>[TIME ${time}]</b> Item: ${item}</span><button class="btn-action" onclick="conferir(this)">CONFERIR</button>`;
            document.getElementById('pedidos').prepend(div);
        }

        function conferir(btn) {
            const card = btn.parentElement;
            card.classList.add('concluido');
            btn.innerText = "CONFERIDO";
            btn.style.background = "#95a5a6";
            btn.disabled = true;
        }

        for(let i=0; i<4; i++) criarPedido();
        setInterval(criarPedido, 10000);
    </script>
</body>
</html>
