<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP 4.0 - Painel de Controle Palmas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --dark: #2c3e50; --gold: #f1c40f; --green: #27ae60; --alta: #e74c3c; --light: #f4f7f6; --purple: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 320px; background: var(--dark); color: white; padding: 20px; display: flex; flex-direction: column; border-right: 5px solid #34495e; }
        .user-info { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; border-left: 4px solid var(--gold); margin-bottom: 20px; }
        
        /* PAINEL DE AUDITORIA */
        .auditoria-box { background: white; color: #333; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .erro-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.8em; }
        .btn-liberar { background: var(--green); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .main { flex: 1; padding: 25px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .monitor-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .full-width { grid-column: span 2; }
        
        .kpi-big { font-size: 3em; font-weight: bold; color: var(--dark); margin: 10px 0; }
        canvas { max-height: 250px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-info">
            <small>SVP OPERACIONAL V4.0</small>
            <h2 id="u-nome">JORGE_ZENSQUE</h2>
            <span style="color:var(--gold); font-weight:bold;">ACESSO: GESTÃO MASTER</span>
        </div>

        <button onclick="gerarRelatorioPDF()" style="width:100%; padding:15px; background:var(--purple); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-bottom:10px;">📄 EXPORTAR RELATÓRIO PDF</button>
        
        <div class="auditoria-box">
            <strong style="color:var(--alta)">🚨 DESBLOQUEIO DE LOTES</strong>
            <div id="lista-erros-gestor" style="margin-top:10px;">
                <small>Nenhum lote travado no momento.</small>
            </div>
        </div>

        <div style="margin-top: auto; font-size: 0.7em; opacity: 0.5;">
            Responsável: Jorge Zensque [2026]
        </div>
    </div>

    <div class="main">
        <div class="monitor-card full-width">
            <h3>📈 TENDÊNCIA DE PRODUÇÃO (ÚLT. 30 MIN)</h3>
            <canvas id="graficoProducao"></canvas>
        </div>

        <div class="monitor-card">
            <h3>TOTAL REALIZADO</h3>
            <div class="kpi-big" id="kpi-total">0</div>
            <small>Meta Semanal: 50</small>
        </div>

        <div class="monitor-card">
            <h3>STATUS DA LINHA</h3>
            <div id="status-linha" style="font-size: 1.5em; font-weight: bold; color: var(--green);">● EM OPERAÇÃO</div>
            <p id="msg-parada" style="color: var(--alta); font-weight: bold;"></p>
        </div>
    </div>

    <script>
        let processados = parseInt(localStorage.getItem('svp_score')) || 0;
        let erros = JSON.parse(localStorage.getItem('svp_errors')) || [];
        
        function atualizarInterface() {
            document.getElementById('kpi-total').innerText = processados;
            renderizarErros();
        }

        // Função para o Gestor desbloquear o lote travado pelo operador
        function renderizarErros() {
            const container = document.getElementById('lista-erros-gestor');
            if(erros.length === 0) {
                container.innerHTML = "<small>Nenhum lote travado.</small>";
                return;
            }

            container.innerHTML = erros.map((err, index) => `
                <div class="erro-item">
                    <span><b>${err.item}</b> (${err.op})</span>
                    <button class="btn-liberar" onclick="desbloquearLote(${index})">LIBERAR</button>
                </div>
            `).join('');
        }

        function desbloquearLote(index) {
            if(confirm("Confirmar desbloqueio manual deste lote?")) {
                erros.splice(index, 1);
                processados++; // Conta como realizado após auditoria
                localStorage.setItem('svp_score', processados);
                localStorage.setItem('svp_errors', JSON.stringify(erros));
                atualizarInterface();
            }
        }

        // Configuração do Gráfico de Tendência
        const ctx = document.getElementById('graficoProducao').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['10m atrás', '8m atrás', '6m atrás', '4m atrás', '2m atrás', 'Agora'],
                datasets: [{
                    label: 'Lotes por Minuto',
                    data: [2, 5, 3, 8, 4, 6],
                    borderColor: '#8e44ad',
                    backgroundColor: 'rgba(142, 68, 173, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        function gerarRelatorioPDF() {
            window.print();
        }

        atualizarInterface();
    </script>
</body>
</html>
