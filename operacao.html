<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP 4.0 - Blindado Palmas</title>
    <style>
        :root { 
            --baixa: #ecf0f1; --normal: #3498db; --normal-alta: #f1c40f; --alta: #e74c3c;
            --dark: #2c3e50; --gold: #f1c40f; --green: #27ae60; --light: #f4f7f6; --purple: #8e44ad;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: var(--dark); color: white; padding: 20px; display: flex; flex-direction: column; border-right: 5px solid #34495e; }
        .user-info { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; border-left: 4px solid var(--gold); margin-bottom: 15px; }
        
        .admin-panel, #area-auditoria-master { 
            display: none; 
            background: #1e272e; padding: 15px; border-radius: 8px; border: 1px solid var(--gold); margin-bottom: 15px; 
        }
        
        #area-auditoria-master { border-color: var(--alta); background: #ffffff; color: #2c3e50; }

        .btn-lider { width: 100%; padding: 10px; margin-top: 5px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-stop { background: #ff0000; color: white; border: 4px solid #b30000; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.2em; animation: pulse-red 1.5s infinite; }
        
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }

        /* Área Principal */
        .main { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 10px solid #ccc; }
        
        /* Overlay de Parada */
        #overlay-stop { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(139,0,0,0.95); z-index:9999; flex-direction:column; justify-content:center; align-items:center; color:white; }

        #svp-pad { position: absolute; top: 150px; right: 30px; width: 220px; background: var(--dark); border: 2px solid var(--gold); border-radius: 12px; padding: 15px; color: white; z-index: 1000; cursor: grab; }
        #display-pad { background:#1e272e; color:#2ecc71; padding:10px; text-align:right; border-radius:5px; margin-bottom:10px; font-family: monospace; font-size: 1.2em; }
    </style>
</head>
<body>

    <div id="overlay-stop">
        <h1 style="font-size: 4em; margin:0;">STOP</h1>
        <p id="txt-stop" style="font-size: 1.5em; color: var(--gold);"></p>
        <button onclick="retomar()" style="background:var(--green); color:white; border:none; padding:20px 60px; border-radius:50px; font-weight:bold; cursor:pointer; font-size:1.5em;">RETOMAR LINHA</button>
    </div>

    <div class="sidebar">
        <div class="user-info">
            <small>SVP OPERACIONAL V4.0</small>
            <h3 id="u-nome" style="margin:5px 0">---</h3>
            <span id="u-time" style="color:var(--gold); font-weight: bold;">--</span>
            <button onclick="localStorage.clear(); window.location.href='index.html'" style="width:100%; margin-top:10px; background:none; border:1px solid #e74c3c; color:#e74c3c; cursor:pointer; font-size:0.7em;">SAIR</button>
        </div>

        <button class="btn-stop" onclick="acionarStop()">S T O P</button>

        <div class="admin-panel" id="panel-ceo">
            <small style="color:var(--gold)">GESTÃO MASTER</small>
            <button class="btn-lider" style="background:var(--purple)" onclick="gerarRelatorioPDF()">📄 RELATÓRIO PDF</button>
            <button class="btn-lider" style="background:#555" onclick="resetarMeta()">ZERAR SEMANA</button>
        </div>

        <div id="area-auditoria-master">
            <h4 style="color:var(--alta); margin:5px 0;">🚨 AUDITORIA</h4>
            <div id="lista-bloqueados" style="font-size: 0.75em;"></div>
        </div>

        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-top:15px;">
            <small>META SEMANAL</small>
            <h3 id="meta-txt" style="margin:5px 0">0 / 50</h3>
            <div style="height: 10px; background: #444; border-radius: 5px; overflow: hidden;">
                <div id="meta-barra" style="height: 100%; background: var(--gold); width: 0%;"></div>
            </div>
        </div>

        <div style="margin-top: auto; font-size: 0.6em; opacity: 0.5;">
            Responsável: Jorge Zensque [2026]
        </div>
    </div>

    <div class="main">
        <div id="container-pedidos"></div>
        <div id="svp-pad">
            <div id="display-pad">0</div>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 5px;">
                <button onclick="teclar(7)" style="padding:10px">7</button><button onclick="teclar(8)" style="padding:10px">8</button><button onclick="teclar(9)" style="padding:10px">9</button>
                <button onclick="teclar(4)" style="padding:10px">4</button><button onclick="teclar(5)" style="padding:10px">5</button><button onclick="teclar(6)" style="padding:10px">6</button>
                <button onclick="teclar(1)" style="padding:10px">1</button><button onclick="teclar(2)" style="padding:10px">2</button><button onclick="teclar(3)" style="padding:10px">3</button>
                <button onclick="limparPad()" style="background:var(--alta); color:white">C</button>
                <button onclick="teclar(0)" style="padding:10px">0</button>
                <button onclick="limparPad()" style="background:var(--green); color:white">OK</button>
            </div>
        </div>
    </div>

    <script>
        const gestores = ['jorge_zensque', 'diretor'];
        const user = localStorage.getItem('svp_user') || 'visitante';
        let processados = parseInt(localStorage.getItem('svp_score')) || 0;
        let paradas = JSON.parse(localStorage.getItem('svp_paradas')) || [];
        let erros = JSON.parse(localStorage.getItem('svp_errors')) || [];
        let isStopped = false;

        function acionarStop() {
            let m = prompt("Motivo da parada (Ex: Banheiro, Energia, Acidente):");
            if (!m) return;
            isStopped = true;
            document.getElementById('txt-stop').innerText = "MOTIVO: " + m.toUpperCase();
            document.getElementById('overlay-stop').style.display = 'flex';
            paradas.push({ motivo: m, inicio: new Date().toLocaleTimeString(), user: user });
            localStorage.setItem('svp_paradas', JSON.stringify(paradas));
        }

        function retomar() {
            isStopped = false;
            document.getElementById('overlay-stop').style.display = 'none';
            if(paradas.length > 0) paradas[paradas.length-1].fim = new Date().toLocaleTimeString();
            localStorage.setItem('svp_paradas', JSON.stringify(paradas));
        }

        function aplicarSeguranca() {
            document.getElementById('u-nome').innerText = user.toUpperCase();
            if(gestores.includes(user.toLowerCase())) {
                document.getElementById('panel-ceo').style.display = 'block';
                document.getElementById('area-auditoria-master').style.display = 'block';
            }
            atualizarTelas();
            // Logout por inatividade
            setTimeout(() => { if(!isStopped) { localStorage.clear(); window.location.href='index.html'; } }, 30 * 60 * 1000);
        }

        function darBaixa(btn, item) {
            const val = parseInt(document.getElementById('display-pad').innerText);
            // Simulação de saldo (Ex: Óculos = 500)
            if (val !== 500 && val !== 300 && val !== 200 && val !== 600) {
                erros.push({ item: item, op: user, hora: new Date().toLocaleTimeString() });
                processados = Math.max(0, processados - 5);
                localStorage.setItem('svp_score', processados);
                localStorage.setItem('svp_errors', JSON.stringify(erros));
                btn.parentElement.remove();
                alert("VALOR INCORRETO!");
                atualizarTelas();
                return;
            }
            processados++;
            localStorage.setItem('svp_score', processados);
            btn.parentElement.classList.add('concluido');
            atualizarTelas();
        }

        function atualizarTelas() {
            document.getElementById('meta-txt').innerText = `${processados} / 50`;
            document.getElementById('meta-barra').style.width = Math.min((processados/50)*100, 100) + "%";
            const aud = document.getElementById('lista-bloqueados');
            aud.innerHTML = erros.map(e => `<div style="background:#f8d7da; padding:3px; margin:2px;">${e.item} (${e.op})</div>`).join('') || 'Limpo';
        }

        function gerarRelatorioPDF() {
            const win = window.open('', '_blank');
            win.document.write(`
                <html><body><h1>Relatório SVP - Gestão Jorge</h1>
                <p>Data: ${new Date().toLocaleDateString()}</p>
                <p>Produção: ${processados}/50</p>
                <h3>Paradas de Linha (STOP):</h3>
                <ul>${paradas.map(p => `<li>${p.motivo} | Início: ${p.inicio} | Fim: ${p.fim || '---'}</li>`).join('')}</ul>
                <h3>Erros:</h3>
                <ul>${erros.map(e => `<li>${e.item} - Op: ${e.op}</li>`).join('')}</ul>
                </body></html>`);
            win.print();
        }

        function resetarMeta() { if(confirm("Zerar tudo?")) { localStorage.clear(); location.reload(); } }

        let buffer = "";
        function teclar(n) { buffer += n; document.getElementById('display-pad').innerText = buffer; }
        function limparPad() { buffer = ""; document.getElementById('display-pad').innerText = "0"; }

        setInterval(() => { if(!isStopped) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div><small>PENDENTE</small><br>📦 Lote Aleatório</div><button class="btn-lider" style="background:var(--dark); width:auto" onclick="darBaixa(this, 'Lote')">BAIXA</button>`;
            document.getElementById('container-pedidos').prepend(div);
            if(document.getElementById('container-pedidos').children.length > 5) document.getElementById('container-pedidos').lastChild.remove();
        }}, 8000);

        aplicarSeguranca();
    </script>
</body>
</html>
