<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP 4.0 - Controle Unidade Palmas</title>
    <style>
        :root { --dark: #2c3e50; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 300px; background: var(--dark); color: white; padding: 20px; display: flex; flex-direction: column; border-right: 4px solid var(--gold); }
        .btn-stop { background: var(--red); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.2em; margin-bottom: 20px; }

        /* Dashboard de Quadrados (KPIs) - VISÍVEL PARA TODOS */
        .top-dash { display: flex; gap: 15px; margin-bottom: 25px; }
        .kpi-box { flex: 1; background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; text-align: center; border-top: 5px solid var(--blue); }
        .kpi-box small { color: #7f8c8d; font-size: 0.75em; font-weight: bold; display: block; }
        .kpi-box b { font-size: 2em; color: var(--dark); display: block; }

        /* Gráfico de Análise - SÓ PARA GESTÃO */
        #painel-grafico { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; display: none; }
        .barra-bg { background: #eee; height: 15px; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        #barra-progresso { height: 100%; width: 0%; background: var(--green); transition: 0.5s; }

        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .lote-card { background: white; padding: 12px; border-radius: 5px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #ccc; cursor: pointer; }
        .lote-card.selected { border-color: var(--gold); background: #fffdf0; }

        /* Calculadora Operador */
        .calc-area { background: #1e272e; padding: 10px; border-radius: 8px; margin-top: auto; }
        .display { background: #000; color: var(--green); padding: 10px; text-align: right; font-family: monospace; font-size: 1.5em; border-radius: 4px; margin-bottom: 8px; }
        .keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .keys button { padding: 12px; border: none; border-radius: 4px; background: #34495e; color: white; font-weight: bold; cursor: pointer; }

        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(150,0,0,0.95); z-index:9999; flex-direction:column; justify-content:center; align-items:center; color:white; text-align:center; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="font-size: 5em; margin: 0;">STOP</h1>
        <p id="stop-msg" style="font-size: 1.5em;"></p>
        <button id="btn-retomar" onclick="retomar()" style="display:none; padding:15px 40px; background:var(--green); color:white; border:none; border-radius:30px; font-weight:bold; cursor:pointer; margin-top:20px;">RETOMAR LINHA</button>
        <h3 id="aviso-chefia" style="display:none; color:var(--gold)">AGUARDE LIBERAÇÃO DA GESTÃO</h3>
    </div>

    <div class="sidebar">
        <div style="margin-bottom:15px">
            <small>SVP 4.0 - PALMAS</small>
            <h3 id="u-nome" style="margin:5px 0">---</h3>
            <span id="u-cargo" style="font-size:0.7em; color:var(--gold)"></span>
        </div>

        <button class="btn-stop" onclick="parar()">S T O P</button>

        <div id="painel-op" style="display:none">
            <div class="calc-area">
                <div class="display" id="calc-val">0</div>
                <div class="keys">
                    <button onclick="teclar(7)">7</button><button onclick="teclar(8)">8</button><button onclick="teclar(9)">9</button>
                    <button onclick="teclar(4)">4</button><button onclick="teclar(5)">5</button><button onclick="teclar(6)">6</button>
                    <button onclick="teclar(1)">1</button><button onclick="teclar(2)">2</button><button onclick="teclar(3)">3</button>
                    <button onclick="limpar()" style="background:var(--red)">C</button>
                    <button onclick="teclar(0)">0</button>
                    <button onclick="confirmar()" style="background:var(--green)">OK</button>
                </div>
            </div>
        </div>
        <button onclick="localStorage.clear(); location.href='index.html'" style="margin-top:20px; background:none; border:none; color:#666; font-size:0.7em; cursor:pointer;">SAIR</button>
    </div>

    <div class="main">
        <div class="top-dash">
            <div class="kpi-box">
                <small>REALIZADO</small>
                <b id="kpi-prod">0</b>
            </div>
            <div class="kpi-box">
                <small>META SEMANAL</small>
                <b>50</b>
            </div>
        </div>

        <div id="painel-grafico">
            <small style="color:var(--dark); font-weight:bold;">ANÁLISE DE PERFORMANCE (ESG/PRODUÇÃO)</small>
            <div class="barra-bg"><div id="barra-progresso"></div></div>
            <div id="percent-txt" style="font-size:0.7em; text-align:right; margin-top:5px;">0%</div>
        </div>

        <h3>FILA SAP ATIVA</h3>
        <div id="fila-lotes"></div>
    </div>

    <script>
        const gestores = ['JORGE_ZENSQUE', 'CEO_JOVEM', 'GER_LOGISTICA'];
        const user = localStorage.getItem('svp_user') || 'OP_01';
        let prod = parseInt(localStorage.getItem('svp_prod')) || 0;
        let buffer = "";
        let selecionado = null;

        function init() {
            document.getElementById('u-nome').innerText = user;
            const isGestor = gestores.includes(user);
            document.getElementById('u-cargo').innerText = isGestor ? "GESTÃO MASTER" : "OPERADOR";
            
            if(!isGestor) {
                document.getElementById('painel-op').style.display = 'block';
            } else {
                document.getElementById('painel-grafico').style.display = 'block';
            }
            
            atualizar();
            renderFila();
        }

        function atualizar() {
            document.getElementById('kpi-prod').innerText = prod;
            const p = Math.min((prod/50)*100, 100);
            if(document.getElementById('barra-progresso')) {
                document.getElementById('barra-progresso').style.width = p + "%";
                document.getElementById('percent-txt').innerText = p.toFixed(1) + "% concluído";
            }
            localStorage.setItem('svp_prod', prod);
        }

        function parar() {
            const m = prompt("MOTIVO STOP:");
            if(!m) return;
            const isGestor = gestores.includes(user);
            localStorage.setItem('lock_by', isGestor ? 'MASTER' : 'OP');
            document.getElementById('stop-msg').innerText = "BLOQUEIO POR: " + user + "\nMOTIVO: " + m.toUpperCase();
            document.getElementById('overlay').style.display = 'flex';
            
            if(localStorage.getItem('lock_by') === 'MASTER' && !isGestor) {
                document.getElementById('btn-retomar').style.display = 'none';
                document.getElementById('aviso-chefia').style.display = 'block';
            } else {
                document.getElementById('btn-retomar').style.display = 'block';
                document.getElementById('aviso-chefia').style.display = 'none';
            }
        }

        function retomar() { document.getElementById('overlay').style.display = 'none'; localStorage.removeItem('lock_by'); }
        function teclar(n) { buffer += n; document.getElementById('calc-val').innerText = buffer; }
        function limpar() { buffer = ""; document.getElementById('calc-val').innerText = "0"; }

        function confirmar() {
            if(!selecionado) return alert("Selecione um lote!");
            if(parseInt(buffer) === selecionado.v) {
                prod++; selecionado.el.remove(); selecionado = null; limpar(); atualizar();
            } else { alert("ERRO!"); limpar(); }
        }

        function renderFila() {
            const f = document.getElementById('fila-lotes');
            const d = [{n:"Papelaria", v:600}, {n:"Óculos", v:500}, {n:"Cozinha", v:300}];
            for(let i=0; i<5; i++) {
                const it = d[Math.floor(Math.random()*3)];
                const div = document.createElement('div');
                div.className = 'lote-card';
                div.onclick = function() {
                    document.querySelectorAll('.lote-card').forEach(c=>c.classList.remove('selected'));
                    this.classList.add('selected'); selecionado = { el: this, v: it.v };
                };
                div.innerHTML = `<div><b>LOTE: ${it.n}</b><br><small>Aguardando Baixa</small></div><span style="font-size:0.7em; color:#999">SVP-OP</span>`;
                f.appendChild(div);
            }
        }
        init();
    </script>
</body>
</html>
