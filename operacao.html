<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP 4.0 - Sistema de Gestão Palmas</title>
    <style>
        :root { 
            --dark: #2c3e50; --gold: #f1c40f; --green: #27ae60; --alta: #e74c3c; --light: #f4f7f6; --purple: #8e44ad;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Fixa e Organizada */
        .sidebar { width: 320px; background: var(--dark); color: white; padding: 20px; display: flex; flex-direction: column; border-right: 5px solid #34495e; overflow-y: auto; }
        
        .user-info { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; border-left: 4px solid var(--gold); margin-bottom: 15px; }
        
        .btn-stop { background: #ff0000; color: white; border: 4px solid #b30000; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 15px; width: 100%; font-size: 1.2em; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); } }

        /* Calculadora Integrada na Lateral */
        #container-calculadora { background: #1e272e; padding: 12px; border-radius: 8px; border: 1px solid #444; margin-top: 10px; display: none; }
        .display { background: #000; color: #2ecc71; padding: 10px; text-align: right; margin-bottom: 8px; font-family: monospace; border-radius: 4px; font-size: 1.2em; }
        .pad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .pad-grid button { padding: 12px; border: none; border-radius: 4px; background: #34495e; color: white; font-weight: bold; cursor: pointer; }
        .pad-grid button:active { background: var(--gold); }

        /* Área de Trabalho */
        .main { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 10px solid #ccc; cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateX(5px); }
        .card.selecionado { border: 3px solid var(--gold) !important; background: #fffdf2; }
        
        /* Overlay de Emergência */
        #overlay-stop { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(139,0,0,0.95); z-index:9999; flex-direction:column; justify-content:center; align-items:center; color:white; text-align:center; }

        .btn-lider { width: 100%; padding: 10px; margin-top: 5px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div id="overlay-stop">
        <h1 style="font-size: 5em; margin:0;">S T O P</h1>
        <p id="motivo-txt" style="font-size: 1.5em; color: var(--gold);"></p>
        <button onclick="retomarLinha()" style="padding:20px 60px; background:var(--green); color:white; border:none; border-radius:50px; font-weight:bold; cursor:pointer; font-size:1.5em; margin-top:20px;">RETOMAR OPERAÇÃO</button>
    </div>

    <div class="sidebar">
        <div class="user-info">
            <small>SVP OPERACIONAL V4.0</small>
            <h3 id="u-nome" style="margin:5px 0">---</h3>
            <span id="u-nivel" style="color:var(--gold); font-size:0.8em; font-weight:bold;"></span>
            <button onclick="localStorage.clear(); window.location.href='index.html'" style="width:100%; margin-top:10px; background:none; border:1px solid #e74c3c; color:#e74c3c; cursor:pointer; font-size:0.7em; border-radius:4px;">ENCERRAR SESSÃO</button>
        </div>

        <div id="painel-operador" style="display:none">
            <button class="btn-stop" onclick="acionarStop()">S T O P</button>

            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; margin-bottom:10px; border-left: 3px solid var(--gold);">
                <small style="color:var(--gold); font-weight:bold;">📦 ESTOQUE CENTRAL</small>
                <div id="lista-estoque" style="font-size:0.85em; margin-top:5px; font-family: monospace;"></div>
            </div>

            <div id="container-calculadora" style="display:block">
                <div class="display" id="display-pad">0</div>
                <div class="pad-grid">
                    <button onclick="teclar(7)">7</button><button onclick="teclar(8)">8</button><button onclick="teclar(9)">9</button>
                    <button onclick="teclar(4)">4</button><button onclick="teclar(5)">5</button><button onclick="teclar(6)">6</button>
                    <button onclick="teclar(1)">1</button><button onclick="teclar(2)">2</button><button onclick="teclar(3)">3</button>
                    <button onclick="limparPad()" style="background:var(--alta)">C</button>
                    <button onclick="teclar(0)">0</button>
                    <button onclick="confirmarBaixa()" style="background:var(--green)">OK</button>
                </div>
            </div>
        </div>

        <div id="painel-ceo" style="display:none">
            <h4 style="color:var(--gold); margin:0 0 10px 0;">GESTÃO MASTER</h4>
            <button class="btn-lider" style="background:var(--purple)" onclick="gerarRelatorioPDF()">📄 RELATÓRIO PDF</button>
            <button class="btn-lider" style="background:#444" onclick="resetarSemana()">Zerar Semana</button>
            
            <div style="margin-top:20px; background:white; color:#2c3e50; padding:10px; border-radius:5px;">
                <strong style="font-size:0.8em; color:var(--alta)">🚨 AUDITORIA DE ERROS</strong>
                <div id="lista-erros" style="font-size:0.7em; margin-top:5px;">Nenhum erro.</div>
            </div>
        </div>

        <div style="margin-top:15px; background:rgba(255,255,255,0.05); padding:10px; border-radius:5px;">
            <small>PROGRESSO: <span id="meta-txt">0 / 50</span></small>
            <div style="height: 8px; background: #444; border-radius: 4px; overflow: hidden; margin-top:5px;">
                <div id="meta-barra" style="height: 100%; background: var(--gold); width: 0%;"></div>
            </div>
        </div>

        <div style="margin-top:auto; font-size:0.6em; opacity:0.5;">
            Responsável: Jorge Zensque [2026]
        </div>
    </div>

    <div class="main">
        <h2 id="titulo-area">PROCESSAMENTO DE LOTES</h2>
        <div id="container-pedidos"></div>
    </div>

    <script>
        const gestores = ['jorge_zensque', 'diretor', 'gerente'];
        const usuario = localStorage.getItem('svp_user') || 'OP_01';
        let processados = parseInt(localStorage.getItem('svp_score')) || 0;
        let erros = JSON.parse(localStorage.getItem('svp_errors')) || [];
        let paradas = JSON.parse(localStorage.getItem('svp_paradas')) || [];
        
        let loteAtivo = null;
        let freeze = false;

        function inicializar() {
            document.getElementById('u-nome').innerText = usuario.toUpperCase();
            const isCEO = gestores.includes(usuario.toLowerCase());

            if(isCEO) {
                document.getElementById('u-nivel').innerText = "ACESSO: GESTÃO MASTER";
                document.getElementById('painel-ceo').style.display = 'block';
                document.getElementById('titulo-area').innerText = "MONITORAMENTO EM TEMPO REAL";
            } else {
                document.getElementById('u-nivel').innerText = "ACESSO: OPERACIONAL";
                document.getElementById('painel-operador').style.display = 'block';
                renderizarEstoque();
            }
            atualizarTelas();
            setInterval(gerarDemanda, 8000);
        }

        function renderizarEstoque() {
            const itens = { "Óculos": 500, "Cozinha": 300, "Eletrônicos": 200, "Papelaria": 600 };
            document.getElementById('lista-estoque').innerHTML = Object.entries(itens)
                .map(([k, v]) => `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #444; padding:3px 0"><span>${k}</span><b>${v}</b></div>`).join('');
        }

        function selecionarLote(el, item, valorCorreto) {
            if(gestores.includes(usuario.toLowerCase())) return;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selecionado'));
            el.classList.add('selecionado');
            loteAtivo = { el, item, valorCorreto };
        }

        let buffer = "";
        function teclar(n) { buffer += n; document.getElementById('display-pad').innerText = buffer; }
        function limparPad() { buffer = ""; document.getElementById('display-pad').innerText = "0"; }

        function confirmarBaixa() {
            if(!loteAtivo) return alert("Selecione um lote primeiro!");
            if(parseInt(buffer) === loteAtivo.valorCorreto) {
                processados++;
                loteAtivo.el.remove();
                localStorage.setItem('svp_score', processados);
                loteAtivo = null;
                limparPad();
                atualizarTelas();
            } else {
                erros.push({ item: loteAtivo.item, op: usuario, hora: new Date().toLocaleTimeString() });
                localStorage.setItem('svp_errors', JSON.stringify(erros));
                alert("VALOR INCORRETO! Lote enviado para auditoria.");
                loteAtivo.el.remove();
                loteAtivo = null;
                limparPad();
            }
        }

        function acionarStop() {
            const m = prompt("Motivo do STOP:");
            if(!m) return;
            freeze = true;
            document.getElementById('motivo-txt').innerText = "MOTIVO: " + m.toUpperCase();
            document.getElementById('overlay-stop').style.display = 'flex';
            paradas.push({ motivo: m, inicio: new Date().toLocaleTimeString() });
            localStorage.setItem('svp_paradas', JSON.stringify(paradas));
        }

        function retomarLinha() {
            freeze = false;
            document.getElementById('overlay-stop').style.display = 'none';
            if(paradas.length > 0) paradas[paradas.length-1].fim = new Date().toLocaleTimeString();
            localStorage.setItem('svp_paradas', JSON.stringify(paradas));
        }

        function atualizarTelas() {
            document.getElementById('meta-txt').innerText = `${processados} / 50`;
            document.getElementById('meta-barra').style.width = Math.min((processados/50)*100, 100) + "%";
            if(gestores.includes(usuario.toLowerCase())) {
                document.getElementById('lista-erros').innerHTML = erros.map(e => `<div>${e.item} (${e.op})</div>`).join('') || 'Nenhum erro.';
            }
        }

        function gerarDemanda() {
            if(freeze) return;
            const tipos = [{n:"Óculos", v:500}, {n:"Cozinha", v:300}, {n:"Eletrônicos", v:200}, {n:"Papelaria", v:600}];
            const t = tipos[Math.floor(Math.random()*4)];
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = function() { selecionarLote(this, t.n, t.v); };
            card.innerHTML = `<div><b>📦 LOTE: ${t.n}</b><br><small>Aguardando Baixa SAP</small></div><button style="background:var(--dark); color:white; border:none; padding:8px; border-radius:4px; font-size:0.7em;">BAIXA SAP</button>`;
            document.getElementById('container-pedidos').prepend(card);
            if(document.getElementById('container-pedidos').children.length > 6) document.getElementById('container-pedidos').lastChild.remove();
        }

        function gerarRelatorioPDF() {
            const win = window.open('', '_blank');
            win.document.write(`<html><body><h1>Relatório SVP - Gestão Jorge</h1><p>Produção: ${processados}/50</p><h3>Paradas (STOP):</h3><ul>${paradas.map(p => `<li>${p.motivo} (${p.inicio} - ${p.fim || '---'})</li>`).join('')}</ul></body></html>`);
            win.print();
        }

        function resetarSemana() { if(confirm("Deseja zerar o progresso?")) { localStorage.clear(); location.reload(); } }

        inicializar();
    </script>
</body>
</html>
