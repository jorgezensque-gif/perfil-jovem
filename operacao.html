<style>
    .btn-gestor-trava {
        background: #000;
        color: var(--gold);
        border: 2px solid var(--gold);
        padding: 15px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 15px;
        width: 100%;
        display: none; /* Só aparece no alerta */
    }
    .btn-gestor-trava:hover { background: var(--gold); color: black; }
</style>

<div class="main">
    <header class="top-bar">
        <div id="status-linha" style="color: var(--green); font-weight: bold;">● EM OPERAÇÃO</div>
        <div style="text-align: right;">
            <span id="kpi-total" style="font-size: 1.8em; font-weight: bold; color: var(--purple);">0</span>
            <span style="background:#eee; padding:2px 8px; border-radius:10px; font-size:0.7em;">META: 40/dia</span>
        </div>
    </header>

    <div class="content">
        <div id="msg-gestor" class="alerta-gestor">
            <h2 style="margin:0">⚠️ ALERTA DE TRANSBORDAMENTO (3 DIAS)</h2>
            <p>A produção acumulada atingiu o limite de segurança.</p>
            <button id="btn-disparo" class="btn-gestor-trava" onclick="pararDisparo()">
                ⛔ PARAR DISPARO DE NOVOS LOTES
            </button>
        </div>

        <h3 id="titulo-fila">📋 FILA DE PRODUÇÃO ATIVA</h3>
        <div id="lista-lotes"></div>
    </div>
</div>

<script>
    let diasAcumulados = 3; // Simulação de gatilho
    let disparoAtivo = true;

    function verificarTrava() {
        if (diasAcumulados >= 3) {
            document.getElementById('msg-gestor').style.display = 'block';
            document.getElementById('btn-disparo').style.display = 'block';
            // Deixa a fila em "Aviso Vermelho"
            document.querySelectorAll('.lote-card').forEach(c => c.style.borderColor = 'red');
        }
    }

    function pararDisparo() {
        disparoAtivo = false;
        alert("COMANDO ENVIADO: O SAP não enviará novos lotes até a limpeza da fila.");
        
        const btn = document.getElementById('btn-disparo');
        btn.innerText = "✅ DISPARO SUSPENSO PELO GESTOR";
        btn.style.background = "#27ae60";
        btn.style.borderColor = "#27ae60";
        btn.disabled = true;
        
        document.getElementById('status-linha').innerText = "🛑 DISPARO BLOQUEADO";
        document.getElementById('status-linha').style.color = "orange";
    }

    // ... (restante das funções addNum, confirmar e updateUI permanecem iguais)
</script>
