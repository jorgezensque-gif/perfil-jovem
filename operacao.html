<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP 4.0 - Operacional Palmas (CORRIGIDO)</title>
    <style>
        :root { --dark: #2c3e50; --gold: #f1c40f; --green: #27ae60; --alta: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: var(--dark); color: white; padding: 20px; border-right: 5px solid #34495e; }
        .user-info { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; border-left: 4px solid var(--gold); margin-bottom: 20px; }
        
        /* Botão STOP Corrigido */
        .btn-stop { width:100%; padding:15px; background:red; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-bottom:15px; font-size:1.2em; transition: 0.2s; }
        .btn-stop:active { background: darkred; transform: scale(0.98); }
        .btn-stop.ativo { background: #555 !important; }

        /* Calculadora */
        .calc-display { background: black; color: #27ae60; padding: 15px; text-align: right; font-family: monospace; font-size: 1.5em; border-radius: 5px; margin-bottom: 10px; }
        .calc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .calc-btn { padding: 20px; border: none; border-radius: 5px; background: #34495e; color: white; font-size: 1.2em; cursor: pointer; }

        /* Painel Central */
        .main { flex: 1; padding: 25px; display: flex; justify-content: center; align-items: center; }
        .kpi-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; width: 80%; }
        #status-texto { font-weight: bold; margin-top: 20px; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-info">
            <small>SVP OPERACIONAL V4.0</small>
            <h2 style="margin:5px 0">OP_01</h2>
            <span style="color:var(--gold); font-size:0.8em; font-weight:bold;">OPERADOR</span>
        </div>

        <button id="btn-main-stop" class="btn-stop" onclick="alternarParada()">S T O P</button>

        <div id="view-operador">
            <div class="calc-display" id="calc-num">0</div>
            <div class="calc-grid">
                <button class="calc-btn" onclick="addNum(7)">7</button><button class="calc-btn" onclick="addNum(8)">8</button><button class="calc-btn" onclick="addNum(9)">9</button>
                <button class="calc-btn" onclick="addNum(4)">4</button><button class="calc-btn" onclick="addNum(5)">5</button><button class="calc-btn" onclick="addNum(6)">6</button>
                <button class="calc-btn" onclick="addNum(1)">1</button><button class="calc-btn" onclick="addNum(2)">2</button><button class="calc-btn" onclick="addNum(3)">3</button>
                <button class="calc-btn" style="background:#e74c3c" onclick="resetCalc()">C</button>
                <button class="calc-btn" onclick="addNum(0)">0</button>
                <button class="calc-btn" style="background:#27ae60" onclick="confirmarLote()">OK</button>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="kpi-card">
            <h1 style="color: var(--dark); margin: 0; font-size: 1.5em;">TOTAL REALIZADO</h1>
            <div id="kpi-total" style="font-size: 8em; font-weight: bold; color: var(--purple); line-height: 1;">0</div>
            <div id="status-texto" style="color: var(--green);">● LINHA EM OPERAÇÃO</div>
        </div>
    </div>

    <script>
        let producaoAtiva = true;

        // FUNÇÃO STOP CORRIGIDA
        function alternarParada() {
            const btn = document.getElementById('btn-main-stop');
            const status = document.getElementById('status-texto');
            
            producaoAtiva = !producaoAtiva;

            if (!producaoAtiva) {
                btn.innerText = "RETOMAR";
                btn.classList.add('ativo');
                status.innerText = "■ LINHA PARADA";
                status.style.color = "red";
                console.warn("Produção interrompida pelo operador.");
            } else {
                btn.innerText = "S T O P";
                btn.classList.remove('ativo');
                status.innerText = "● LINHA EM OPERAÇÃO";
                status.style.color = "green";
            }
        }

        function addNum(n) {
            if (!producaoAtiva) return alert("Retome a produção para inserir dados!");
            let d = document.getElementById('calc-num');
            d.innerText = d.innerText === "0" ? n : d.innerText + n;
        }

        function resetCalc() { document.getElementById('calc-num').innerText = "0"; }

        function confirmarLote() {
            if (!producaoAtiva) return;
            let val = parseInt(document.getElementById('calc-num').innerText);
            if(val > 0) {
                let atual = parseInt(localStorage.getItem('svp_score') || 0);
                localStorage.setItem('svp_score', atual + 1);
                updateKPI(); // Atualiza na hora
                resetCalc();
            }
        }

        function updateKPI() {
            const valor = localStorage.getItem('svp_score') || 0;
            document.getElementById('kpi-total').innerText = valor;
        }

        // Garante que o placar carregue ao abrir
        window.onload = updateKPI;
    </script>
</body>
</html>
