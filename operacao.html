<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP 4.0 - Palmas (Gestão Restrita)</title>
    <style>
        :root { --dark: #232f3e; --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --purple: #9b59b6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 320px; background: #2c3e50; color: white; display: flex; flex-direction: column; padding: 15px; border-right: 4px solid #1a252f; }
        .user-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border-left: 5px solid var(--gold); margin-bottom: 15px; }
        
        /* ESTOQUE SAP (CORRIGIDO) */
        .sap-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9em; }
        .sap-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }

        /* CALCULADORA */
        .calc { margin-top: auto; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        .screen { background: #000; color: var(--green); text-align: right; padding: 10px; font-size: 1.5em; font-family: monospace; border-radius: 4px; margin-bottom: 8px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn-c { padding: 15px; border: none; border-radius: 4px; background: #3e5871; color: white; font-weight: bold; cursor: pointer; }

        /* MAIN */
        .main { flex: 1; display: flex; flex-direction: column; }
        .top-nav { background: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .view { padding: 25px; overflow-y: auto; }

        /* ALERTA DE 3 DIAS */
        .alerta-transbordo { background: var(--red); color: white; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; display: none; }
        .btn-master { background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-master:disabled { opacity: 0.5; cursor: not-allowed; }

        .lote-card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 8px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="user-box">
            <small>SVP V4.0</small>
            <h3 style="margin: 4px 0;" id="current-user">JORGE_ZENSQUE</h3>
            <span id="user-role" style="color: var(--gold); font-size: 0.75em; font-weight: bold;">GESTÃO MASTER</span>
        </div>

        <button class="btn-c" style="background:var(--red); width:100%; margin-bottom:10px;" onclick="handleStop()">STOP</button>

        <div class="sap-box">
            <b style="color:var(--gold); display:block; margin-bottom:5px;">📦 ESTOQUE SAP</b>
            <div class="sap-row"><span>Óculos:</span> <b>500</b></div>
            <div class="sap-row"><span>Cozinha:</span> <b>300</b></div>
            <div class="sap-row" style="color:var(--gold)"><span>Eletrônicos:</span> <b>200</b></div>
            <div class="sap-row"><span>Papelaria:</span> <b>600</b></div>
        </div>

        <div class="calc">
            <div class="screen" id="scr">0</div>
            <div class="grid">
                <button class="btn-c" onclick="n(7)">7</button><button class="btn-c" onclick="n(8)">8</button><button class="btn-c" onclick="n(9)">9</button>
                <button class="btn-c" onclick="n(4)">4</button><button class="btn-c" onclick="n(5)">5</button><button class="btn-c" onclick="n(6)">6</button>
                <button class="btn-c" onclick="n(1)">1</button><button class="btn-c" onclick="n(2)">2</button><button class="btn-c" onclick="n(3)">3</button>
                <button class="btn-c" style="background:#c0392b" onclick="c()">C</button>
                <button class="btn-c" onclick="n(0)">0</button>
                <button class="btn-c" style="background:var(--green)" onclick="ok()">OK</button>
            </div>
        </div>
    </aside>

    <main class="main">
        <header class="top-nav">
            <div id="st" style="color: var(--green); font-weight: bold;">● EM OPERAÇÃO</div>
            <div style="text-align: right;">
                <span id="prod" style="font-size: 1.8em; font-weight: bold; color: var(--purple);">0</span>
                <span style="margin-left:10px; background:#eee; padding:5px; border-radius:5px; font-size:0.7em;">META: 40</span>
            </div>
        </header>

        <div class="view">
            <div id="alerta" class="alerta-transbordo">
                <h2 style="margin:0">⚠️ TRANSBORDAMENTO (3 DIAS)</h2>
                <p>Apenas o **Gestor Master** pode autorizar a parada do disparo SAP.</p>
                <button id="btn-lock" class="btn-master" onclick="solicitarTrava()">
                    ⛔ PARAR DISPARO DE PRODUÇÃO
                </button>
            </div>

            <h3>📋 FILA ATIVA</h3>
            <div id="lista"></div>
        </div>
    </main>

    <script>
        const USUARIO_LOGADO = "JORGE_ZENSQUE";
        const PERFIL = "GESTÃO MASTER";
        let diasAtraso = 3;

        function solicitarTrava() {
            // VALIDAÇÃO DE IDENTIDADE
            if (USUARIO_LOGADO === "JORGE_ZENSQUE" && PERFIL === "GESTÃO MASTER") {
                document.getElementById('st').innerText = "🛑 DISPARO BLOQUEADO POR JORGE";
                document.getElementById('st').style.color = "orange";
                document.getElementById('btn-lock').innerText = "✅ BLOQUEIO ATIVADO NO SAP";
                document.getElementById('btn-lock').style.background = "green";
                document.getElementById('btn-lock').disabled = true;
            } else {
                alert("ACESSO NEGADO: Apenas Jorge Zensque tem autoridade para travar o disparo.");
            }
        }

        function n(v) { const s = document.getElementById('scr'); s.innerText = s.innerText === "0" ? v : s.innerText + v; }
        function c() { document.getElementById('scr').innerText = "0"; }
        function ok() { 
            let p = parseInt(localStorage.getItem('p') || 0);
            localStorage.setItem('p', p + 1);
            ui(); c();
        }

        function ui() {
            document.getElementById('prod').innerText = localStorage.getItem('p') || 0;
            if(diasAtraso >= 3) document.getElementById('alerta').style.display = "block";
            document.getElementById('lista').innerHTML = `
                <div class="lote-card" style="border-left-color: var(--gold);">
                    <div><b>LOTE: Eletrônicos</b><br><small>3 DIAS DE ACÚMULO</small></div>
                    <span style="color:red; font-weight:bold;">PENDENTE</span>
                </div>
            `;
        }
        window.onload = ui;
    </script>
</body>
</html>
