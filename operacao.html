<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP - Sistema de Gestão Palmas</title>
    <style>
        :root { --blue: #2980b9; --dark: #2c3e50; --gold: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 300px; background: var(--dark); color: white; padding: 20px; border-right: 5px solid #34495e; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--blue); display: flex; justify-content: space-between; align-items: center; }
        
        /* ESTILO DO COLETOR SVP-PAD */
        #svp-pad { position: fixed; bottom: 20px; right: 20px; width: 200px; background: #2c3e50; border: 2px solid var(--gold); border-radius: 12px; padding: 15px; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #display-pad { background: #1e272e; color: #2ecc71; padding: 10px; text-align: right; font-size: 1.2em; border-radius: 5px; margin-bottom: 10px; font-family: monospace; }
        .grid-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .grid-buttons button { padding: 10px; border: none; border-radius: 4px; background: #34495e; color: white; font-weight: bold; cursor: pointer; }
        .grid-buttons button:active { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3 id="u-nome">--</h3>
        <p id="u-time" style="color:var(--gold)">Célula: --</p>
        <hr>
        <h4>ESTOQUE ATUAL</h4>
        <div id="estoque-lista" style="font-size: 0.9em;"></div>
    </div>

    <div class="main">
        <h2>📥 Fila de Pedidos Disponíveis</h2>
        <div id="pedidos"></div>
    </div>

    <div id="svp-pad">
        <div style="font-size: 0.7em; margin-bottom: 5px; color: var(--gold);">AUDITORIA LOGÍSTICA V4.0</div>
        <div id="display-pad">0</div>
        <div class="grid-buttons">
            <button onclick="teclar(7)">7</button><button onclick="teclar(8)">8</button><button onclick="teclar(9)">9</button>
            <button onclick="teclar(4)">4</button><button onclick="teclar(5)">5</button><button onclick="teclar(6)">6</button>
            <button onclick="teclar(1)">1</button><button onclick="teclar(2)">2</button><button onclick="teclar(3)">3</button>
            <button onclick="limparPad()" style="background:#e74c3c">C</button><button onclick="teclar(0)">0</button><button onclick="calcularPad()" style="background:#27ae60">=</button>
        </div>
    </div>

    <script>
        const user = localStorage.getItem('svp_user');
        const time = localStorage.getItem('svp_time');

        document.getElementById('u-nome').innerText = user || 'OPERADOR';
        document.getElementById('u-time').innerText = "Célula: " + (time || '--');

        // Lógica do Coletor
        let buffer = "";
        function teclar(n) { buffer += n; document.getElementById('display-pad').innerText = buffer; }
        function limparPad() { buffer = ""; document.getElementById('display-pad').innerText = "0"; }
        function calcularPad() { try { buffer = eval(buffer).toString(); document.getElementById('display-pad').innerText = buffer; } catch { limparPad(); } }

        // Simulação de Pedidos
        setInterval(() => {
            const itens = ["Óculos", "Cozinha", "Papelaria"];
            const item = itens[Math.floor(Math.random()*3)];
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<span><b>[TIME ${time}]</b> Item: ${item}</span> <button style="background:var(--blue); color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">CONFERIR</button>`;
            document.getElementById('pedidos').prepend(div);
        }, 10000);
    </script>
</body>
</html>
