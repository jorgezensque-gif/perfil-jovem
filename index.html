<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP - Portal Palmas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 320px; z-index: 1; }
        .logo-text { color: #2c3e50; font-weight: bold; margin-bottom: 20px; font-size: 1.2em; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button.btn-login { width: 100%; padding: 12px; background: #2980b9; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #error { color: red; font-size: 0.8em; display: none; margin-top: 10px; }

        /* ESTILO DO COLETOR (SVP-PAD) */
        #svp-pad { position: fixed; bottom: 20px; right: 20px; width: 200px; background: #2c3e50; border: 3px solid #f1c40f; border-radius: 15px; padding: 10px; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-family: monospace; }
        #display-pad { background: #1e272e; color: #2ecc71; padding: 10px; text-align: right; font-size: 1.2em; margin-bottom: 10px; border-radius: 5px; }
        .grid-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .grid-pad button { padding: 10px; cursor: pointer; border: none; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-text">PROJETO PESCAR SVP 4.0<br><small>Unidade Palmas / TO</small></div>
        <input type="text" id="user" placeholder="Usuário (ex: op_01)">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn-login" onclick="login()">ACESSAR SISTEMA</button>
        <p id="error">Usuário ou senha incorretos.</p>
        <p style="font-size: 0.7em; color: #7f8c8d; margin-top: 15px;">Resp: Jorge Zensque [2026]</p>
    </div>

    <div id="svp-pad">
        <div style="font-size: 0.6em; text-align: center; color: #f1c40f; margin-bottom: 5px;">AUDITORIA LOGÍSTICA</div>
        <div id="display-pad">0</div>
        <div class="grid-pad">
            <button onclick="teclar(7)">7</button><button onclick="teclar(8)">8</button><button onclick="teclar(9)">9</button>
            <button onclick="teclar(4)">4</button><button onclick="teclar(5)">5</button><button onclick="teclar(6)">6</button>
            <button onclick="teclar(1)">1</button><button onclick="teclar(2)">2</button><button onclick="teclar(3)">3</button>
            <button onclick="teclar('-')" style="background:#e67e22">-</button><button onclick="teclar(0)">0</button><button onclick="teclar('+')" style="background:#e67e22">+</button>
            <button onclick="limparPad()" style="grid-column: span 2; background:#e74c3c; color:white">C</button>
            <button onclick="calcularPad()" style="background:#2ecc71; color:white">=</button>
        </div>
    </div>

    <script>
        const users = {
            'op_01': { p: 'pescar123', n: 'OPERACIONAL', t: '1' },
            'op_02': { p: 'pescar123', n: 'OPERACIONAL', t: '1' },
            'op_06': { p: 'pescar123', n: 'OPERACIONAL', t: '2' },
            'lider_01': { p: 'lider789', n: 'LIDER', t: '1' },
            'jorge_zensque': { p: 'master2026', n: 'CONSELHO', t: 'all' }
        };

        function login() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;
            if(users[u] && users[u].p === p) {
                localStorage.setItem('svp_nivel', users[u].n);
                localStorage.setItem('svp_user', u);
                window.location.href = 'operacao.html';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        // Lógica do Coletor
        let buffer = "";
        function teclar(n) { buffer += n; document.getElementById('display-pad').innerText = buffer; }
        function limparPad() { buffer = ""; document.getElementById('display-pad').innerText = "0"; }
        function calcularPad() { 
            try { buffer = eval(buffer).toString(); document.getElementById('display-pad').innerText = buffer; } 
            catch { buffer = ""; document.getElementById('display-pad').innerText = "ERRO"; }
        }
    </script>
</body>
</html>
