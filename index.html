<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP 4.0 - Operacional Palmas</title>
    <style>
        body { font-family: sans-serif; background: #ecf0f1; text-align: center; padding: 20px; }
        .lote-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; display: none; }
        .wait-msg { color: #7f8c8d; margin-top: 50px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #bdc3c7; border-radius: 5px; }
        button { background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>SVP 4.0 - Painel do Jovem</h1>
    
    <div id="wait" class="wait-msg">
        <h3>⏳ AGUARDANDO LIBERAÇÃO...</h3>
        <p>O Gestor Master Jorge ainda não disparou os lotes no SAP.</p>
    </div>

    <div id="area-producao" class="lote-card">
        <h2 style="color: #2980b9;">LOTE: ELETRÔNICOS</h2>
        <p>Referência: 2026-E1</p>
        <hr>
        <input type="number" id="qtd" placeholder="Quantidade Processada">
        <button onclick="alert('Lançamento realizado com sucesso!')">FINALIZAR LANÇAMENTO</button>
    </div>

    <script>
        function checkMaster() {
            const status = localStorage.getItem('sap_status');
            const area = document.getElementById('area-producao');
            const wait = document.getElementById('wait');

            if (status === 'LIBERADO') {
                area.style.display = 'block';
                wait.style.display = 'none';
            }
        }
        // Verifica a cada 1 segundo se o Jorge liberou
        setInterval(checkMaster, 1000);
    </script>
</body>
</html>
