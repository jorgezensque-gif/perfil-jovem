<div id="svp-pad" style="position: fixed; bottom: 20px; right: 20px; width: 220px; background: #2c3e50; border: 4px solid #f1c40f; border-radius: 20px; padding: 15px; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; font-family: 'Courier New', monospace;">
    <div style="text-align: center; font-size: 0.7em; color: #f1c40f; margin-bottom: 8px;">AUDITORIA LOGÍSTICA V.4.0</div>
    
    <div id="display-pad" style="background: #1e272e; color: #2ecc71; padding: 10px; border-radius: 5px; text-align: right; font-size: 1.4em; height: 35px; margin-bottom: 10px; border: 1px solid #444;">0</div>
    
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;">
        <button onclick="teclar(7)" style="height: 40px; cursor: pointer;">7</button>
        <button onclick="teclar(8)" style="height: 40px; cursor: pointer;">8</button>
        <button onclick="teclar(9)" style="height: 40px; cursor: pointer;">9</button>
        <button onclick="teclar(4)" style="height: 40px; cursor: pointer;">4</button>
        <button onclick="teclar(5)" style="height: 40px; cursor: pointer;">5</button>
        <button onclick="teclar(6)" style="height: 40px; cursor: pointer;">6</button>
        <button onclick="teclar(1)" style="height: 40px; cursor: pointer;">1</button>
        <button onclick="teclar(2)" style="height: 40px; cursor: pointer;">2</button>
        <button onclick="teclar(3)" style="height: 40px; cursor: pointer;">3</button>
        <button onclick="teclar('-')" style="background: #e67e22; color: white; border: none;">-</button>
        <button onclick="teclar(0)" style="height: 40px; cursor: pointer;">0</button>
        <button onclick="teclar('+')" style="background: #e67e22; color: white; border: none;">+</button>
        <button onclick="limparPad()" style="grid-column: span 2; background: #e74c3c; color: white; border: none; font-size: 0.8em;">C (LIMPAR)</button>
        <button onclick="calcularPad()" style="background: #2ecc71; color: white; border: none; font-weight: bold;">=</button>
    </div>
    <div style="font-size: 0.6em; margin-top: 10px; text-align: center; color: #bdc3c7;">VALIDADOR DE CONFERÊNCIA</div>
</div>

<script>
    let calcBuffer = "";
    function teclar(n) {
        calcBuffer += n;
        document.getElementById('display-pad').innerText = calcBuffer;
    }
    function limparPad() {
        calcBuffer = "";
        document.getElementById('display-pad').innerText = "0";
        document.getElementById('display-pad').style.color = "#2ecc71";
    }
    function calcularPad() {
        try {
            let res = eval(calcBuffer);
            document.getElementById('display-pad').innerText = res;
            calcBuffer = res.toString();
            // Efeito visual de processamento
            document.getElementById('display-pad').style.color = "#f1c40f";
        } catch {
            document.getElementById('display-pad').innerText = "ERRO";
            calcBuffer = "";
        }
    }
</script>
