<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SVP - Login Corporativo Palmas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 350px; }
        .logo-text { color: #2c3e50; font-weight: bold; margin-bottom: 20px; font-size: 1.2em; line-height: 1.2; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        button { width: 100%; padding: 12px; background: #2980b9; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; transition: 0.3s; }
        button:hover { background: #1f6391; }
        #error { color: #e74c3c; font-size: 0.85em; display: none; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-text">PROJETO PESCAR - SVP 4.0<br><small style="color: #7f8c8d;">Unidade Palmas / TO</small></div>
        
        <input type="text" id="user" placeholder="Usuário (ex: op_01, lider_01)">
        <input type="password" id="pass" placeholder="Senha">
        
        <button onclick="login()">AUTENTICAR NO SAP</button>
        
        <p id="error">❌ Credenciais inválidas.</p>
        
        <div style="margin-top: 25px; font-size: 0.7em; color: #bdc3c7;">
            Responsável: Jorge Zensque [2026]
        </div>
    </div>

    <script>
        const users = {
            // TIME 1
            'op_01': { p: 'pescar123', n: 'OPERACIONAL', t: '1' },
            'op_02': { p: 'pescar123', n: 'OPERACIONAL', t: '1' },
            'op_03': { p: 'pescar123', n: 'OPERACIONAL', t: '1' },
            'op_04': { p: 'pescar123', n: 'OPERACIONAL', t: '1' },
            'op_05': { p: 'pescar123', n: 'OPERACIONAL', t: '1' },
            'lider_01': { p: 'lider789', n: 'LIDER', t: '1' },
            // TIME 2
            'op_06': { p: 'pescar123', n: 'OPERACIONAL', t: '2' },
            'op_07': { p: 'pescar123', n: 'OPERACIONAL', t: '2' },
            'op_08': { p: 'pescar123', n: 'OPERACIONAL', t: '2' },
            'op_09': { p: 'pescar123', n: 'OPERACIONAL', t: '2' },
            'op_10': { p: 'pescar123', n: 'OPERACIONAL', t: '2' },
            'lider_02': { p: 'lider789', n: 'LIDER', t: '2' },
            // GESTÃO
            'gerente_01': { p: 'gestao456', n: 'GERENTE', t: 'all' },
            'jorge_zensque': { p: 'master2026', n: 'CONSELHO', t: 'all' }
        };

        function login() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;
            const errorMsg = document.getElementById('error');
            
            if(users[u] && users[u].p === p) {
                // SALVA A SESSÃO
                localStorage.setItem('svp_nivel', users[u].n);
                localStorage.setItem('svp_user', u);
                localStorage.setItem('svp_time', users[u].t);
                
                // REDIRECIONA PARA A TELA DE OPERAÇÃO
                window.location.href = 'operacao.html';
            } else { 
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
